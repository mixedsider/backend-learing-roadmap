name: CI/CD - Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  # ── 1단계: 테스트 ──────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: chapter-10

      - name: Run tests
        run: npm test
        working-directory: chapter-10
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  # ── 2단계: 배포 (테스트 통과 후) ──────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test  # test job 성공 후 실행
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/backend-roadmap/chapter-10
            git pull origin main
            npm ci --omit=dev
            npx prisma migrate deploy
            pm2 restart backend-api || pm2 start src/server.js --name backend-api
            pm2 save
